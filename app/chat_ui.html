<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>微博私信归档</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #ededed;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* -------- 密码页 -------- */
  #lock-screen {
    background: #fff;
    border-radius: 16px;
    padding: 40px 32px;
    width: min(360px, 90vw);
    box-shadow: 0 4px 24px rgba(0,0,0,.12);
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
  }
  #lock-screen h2 { font-size: 20px; color: #1a1a1a; }
  #lock-screen p  { font-size: 13px; color: #888; }
  #pwd-input {
    width: 100%;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    letter-spacing: 4px;
    text-align: center;
    outline: none;
    transition: border-color .2s;
  }
  #pwd-input:focus { border-color: #07c160; }
  #lock-err { color: #f44336; font-size: 13px; display: none; }
  #unlock-btn {
    width: 100%;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 16px;
    cursor: pointer;
    transition: background .2s;
  }
  #unlock-btn:hover { background: #06ad56; }

  /* -------- 主界面 -------- */
  #app {
    display: none;
    width: 100%;
    height: 100dvh;
    max-width: 860px;
    flex-direction: row;
  }

  /* 左侧会话列表 */
  #sidebar {
    width: 240px;
    min-width: 200px;
    background: #f7f7f7;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  #sidebar-header {
    padding: 16px 14px 12px;
    font-size: 15px;
    font-weight: 600;
    color: #333;
    border-bottom: 1px solid #ddd;
    background: #efefef;
  }
  #conv-list { flex: 1; overflow-y: auto; }

  .conv-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid #e8e8e8;
    transition: background .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .conv-item:hover  { background: #e8e8e8; }
  .conv-item.active { background: #07c160; color: #fff; }
  .conv-item-info { flex: 1; min-width: 0; }
  .conv-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .conv-meta { font-size: 11px; margin-top: 2px; opacity: .65; }

  .del-btn {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,.12);
    color: #666;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .15s, background .15s;
  }
  .conv-item:hover .del-btn { opacity: 1; }
  .conv-item.active .del-btn { background: rgba(255,255,255,.25); color: #fff; opacity: 1; }
  .del-btn:hover { background: #f44336 !important; color: #fff !important; }

  /* 右侧聊天区 */
  #chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    background: #ededed;
  }
  #chat-header {
    background: #f7f7f7;
    border-bottom: 1px solid #ddd;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 600;
    color: #333;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #chat-title { flex: 1; }
  #msg-count { font-size: 12px; color: #999; font-weight: 400; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #load-more-wrap { text-align: center; padding: 8px 0 4px; }
  #load-more-btn {
    background: rgba(0,0,0,.06);
    border: none;
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 12px;
    color: #555;
    cursor: pointer;
  }
  #load-more-btn:hover { background: rgba(0,0,0,.1); }

  /* 消息气泡 */
  .msg-row { display: flex; gap: 10px; align-items: flex-start; }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #bbb;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; color: #fff;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .msg-body { display: flex; flex-direction: column; gap: 3px; max-width: 72%; }
  .sender-name { font-size: 11px; color: #888; }
  .bubble {
    background: #fff;
    border-radius: 4px 12px 12px 12px;
    padding: 9px 13px;
    font-size: 14px;
    line-height: 1.55;
    color: #1a1a1a;
    word-break: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .bubble-time { font-size: 10px; color: #bbb; margin-top: 2px; }

  .media-imgs { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .media-imgs img {
    max-width: 180px; max-height: 180px;
    border-radius: 6px; cursor: zoom-in; object-fit: cover;
  }
  .media-link { margin-top: 5px; font-size: 12px; color: #07c160; word-break: break-all; }

  #empty-hint {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #bbb; font-size: 15px; height: 100%;
  }

  /* 灯箱 */
  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.85); z-index: 100;
    align-items: center; justify-content: center;
  }
  #lightbox.show { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 6px; }

  /* 搜索框 */
  #search-wrap { padding: 8px 10px; border-bottom: 1px solid #ddd; background: #f7f7f7; }
  #search-input {
    width: 100%; border: 1px solid #ddd; border-radius: 20px;
    padding: 6px 12px; font-size: 13px; outline: none; background: #fff;
  }
  #search-input:focus { border-color: #07c160; }

  /* 确认弹窗 */
  #confirm-mask {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 200;
    align-items: center; justify-content: center;
  }
  #confirm-mask.show { display: flex; }
  #confirm-box {
    background: #fff; border-radius: 14px;
    padding: 28px 24px 20px; width: min(320px, 88vw);
    text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  #confirm-box h3 { font-size: 16px; color: #1a1a1a; margin-bottom: 8px; }
  #confirm-box p  { font-size: 13px; color: #888; margin-bottom: 22px; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-btns button {
    flex: 1; padding: 11px; border: none; border-radius: 10px;
    font-size: 14px; cursor: pointer;
  }
  #confirm-cancel { background: #f0f0f0; color: #555; }
  #confirm-ok     { background: #f44336; color: #fff; }

  @media (max-width: 600px) {
    #sidebar { width: 120px; min-width: 100px; }
    .conv-name { font-size: 12px; }
    .conv-meta { display: none; }
  }
</style>
</head>
<body>

<!-- 密码锁屏 -->
<div id="lock-screen">
  <h2>🔒 微博私信归档</h2>
  <p>请输入访问密码</p>
  <input id="pwd-input" type="password" placeholder="密码" maxlength="20" autocomplete="off" />
  <div id="lock-err">密码错误，请重试</div>
  <button id="unlock-btn">进入</button>
</div>

<!-- 主界面 -->
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">会话列表</div>
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="搜索会话…" />
    </div>
    <div id="conv-list"></div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">
      <span id="chat-title">请选择一个会话</span>
      <span id="msg-count"></span>
    </div>
    <div id="messages">
      <div id="empty-hint">← 从左侧选择一个会话</div>
    </div>
    <div id="load-more-wrap" style="display:none">
      <button id="load-more-btn">加载更多</button>
    </div>
  </div>
</div>

<!-- 灯箱 -->
<div id="lightbox"><img id="lb-img" src="" /></div>

<!-- 删除确认弹窗 -->
<div id="confirm-mask">
  <div id="confirm-box">
    <h3>删除会话</h3>
    <p id="confirm-text"></p>
    <div class="confirm-btns">
      <button id="confirm-cancel">取消</button>
      <button id="confirm-ok">确认删除</button>
    </div>
  </div>
</div>

<script>
const CORRECT_PWD = "888";
const PAGE_SIZE = 50;
const LS_KEY = "wb_current_conv";

let currentConv = null;
let currentOffset = 0;
let currentTotal = 0;
let allConvs = [];

// ---- 密码验证 ----
const lockScreen = document.getElementById("lock-screen");
const appEl      = document.getElementById("app");
const pwdInput   = document.getElementById("pwd-input");
const lockErr    = document.getElementById("lock-err");

function unlock() {
  if (pwdInput.value === CORRECT_PWD) {
    lockScreen.style.display = "none";
    appEl.style.display = "flex";
    loadConversations();
  } else {
    lockErr.style.display = "block";
    pwdInput.value = "";
    pwdInput.focus();
  }
}
document.getElementById("unlock-btn").onclick = unlock;
pwdInput.addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });

// ---- 会话列表 ----
async function loadConversations(restoreConv) {
  const res = await fetch("/conversations");
  const data = await res.json();
  allConvs = data.results || [];
  renderConvList(allConvs);

  // 刷新后恢复上次选中的会话
  const saved = restoreConv ?? localStorage.getItem(LS_KEY);
  if (saved && allConvs.find(c => c.conversation === saved)) {
    openConv(saved);
  }
}

function renderConvList(list) {
  const el = document.getElementById("conv-list");
  el.innerHTML = "";
  if (!list.length) {
    el.innerHTML = '<div style="padding:20px;color:#bbb;font-size:13px;text-align:center">暂无会话</div>';
    return;
  }
  list.forEach(conv => {
    const item = document.createElement("div");
    item.className = "conv-item" + (conv.conversation === currentConv ? " active" : "");
    item.dataset.name = conv.conversation;

    const info = document.createElement("div");
    info.className = "conv-item-info";
    info.innerHTML = `
      <div class="conv-name">${esc(conv.conversation || "（未命名）")}</div>
      <div class="conv-meta">${conv.msg_count} 条 · ${fmtTime(conv.last_at)}</div>
    `;
    info.onclick = () => openConv(conv.conversation);

    const delBtn = document.createElement("button");
    delBtn.className = "del-btn";
    delBtn.title = "删除会话";
    delBtn.textContent = "×";
    delBtn.onclick = (e) => {
      e.stopPropagation();
      confirmDelete(conv.conversation);
    };

    item.appendChild(info);
    item.appendChild(delBtn);
    el.appendChild(item);
  });
}

document.getElementById("search-input").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  const filtered = q ? allConvs.filter(c => (c.conversation || "").toLowerCase().includes(q)) : allConvs;
  renderConvList(filtered);
});

// ---- 打开会话 ----
async function openConv(name) {
  currentConv = name;
  currentOffset = 0;
  currentTotal = 0;
  localStorage.setItem(LS_KEY, name);

  document.querySelectorAll(".conv-item").forEach(el => {
    el.classList.toggle("active", el.dataset.name === name);
  });
  document.getElementById("chat-title").textContent = name || "（未命名）";
  document.getElementById("msg-count").textContent = "";
  document.getElementById("messages").innerHTML = "";
  document.getElementById("load-more-wrap").style.display = "none";

  await loadMessages();
  const msgEl = document.getElementById("messages");
  msgEl.scrollTop = msgEl.scrollHeight;
}

async function loadMessages() {
  const url = `/messages?conversation=${encodeURIComponent(currentConv)}&offset=${currentOffset}&limit=${PAGE_SIZE}`;
  const res = await fetch(url);
  const data = await res.json();

  currentTotal = data.total;
  document.getElementById("msg-count").textContent = `共 ${currentTotal} 条`;

  const msgEl = document.getElementById("messages");
  const emptyHint = document.getElementById("empty-hint");
  if (emptyHint) emptyHint.remove();

  const fragment = document.createDocumentFragment();
  data.results.forEach(m => fragment.appendChild(buildBubble(m)));
  msgEl.appendChild(fragment);
  currentOffset += data.results.length;

  document.getElementById("load-more-wrap").style.display =
    currentOffset < currentTotal ? "block" : "none";
}

document.getElementById("load-more-btn").onclick = async () => {
  const scrollEl = document.getElementById("messages");
  const prevH = scrollEl.scrollHeight;
  await loadMessages();
  scrollEl.scrollTop = scrollEl.scrollHeight - prevH + scrollEl.scrollTop;
};

// ---- 删除会话 ----
let pendingDeleteConv = null;

function confirmDelete(name) {
  pendingDeleteConv = name;
  document.getElementById("confirm-text").textContent =
    `将永久删除「${name}」中的所有消息，无法恢复。`;
  document.getElementById("confirm-mask").classList.add("show");
}

document.getElementById("confirm-cancel").onclick = () => {
  document.getElementById("confirm-mask").classList.remove("show");
  pendingDeleteConv = null;
};

document.getElementById("confirm-ok").onclick = async () => {
  if (!pendingDeleteConv) return;
  const name = pendingDeleteConv;
  document.getElementById("confirm-mask").classList.remove("show");
  pendingDeleteConv = null;

  await fetch(`/conversations?conversation=${encodeURIComponent(name)}`, { method: "DELETE" });

  // 如果删的是当前会话，清空右侧
  if (currentConv === name) {
    currentConv = null;
    localStorage.removeItem(LS_KEY);
    document.getElementById("chat-title").textContent = "请选择一个会话";
    document.getElementById("msg-count").textContent = "";
    document.getElementById("messages").innerHTML =
      '<div id="empty-hint" style="flex:1;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:15px;height:100%">← 从左侧选择一个会话</div>';
    document.getElementById("load-more-wrap").style.display = "none";
  }

  await loadConversations(currentConv);
};

// ---- 构建气泡 ----
const AVATAR_COLORS = ["#FF5722","#E91E63","#9C27B0","#3F51B5","#2196F3","#009688","#4CAF50","#FF9800"];
const senderColorMap = {};
function avatarColor(name) {
  if (!senderColorMap[name]) {
    const idx = Math.abs(hashStr(name)) % AVATAR_COLORS.length;
    senderColorMap[name] = AVATAR_COLORS[idx];
  }
  return senderColorMap[name];
}
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i);
  return h;
}

function buildBubble(m) {
  const row = document.createElement("div");
  row.className = "msg-row";

  const name = m.sender || "?";
  const color = avatarColor(name);
  const initial = [...name][0] || "?";
  const timeStr = m.sent_time || fmtTime(m.captured_at);

  let mediaHtml = "";
  if (m.media) {
    if (m.media.images && m.media.images.length) {
      const imgs = m.media.images.map(src =>
        `<img src="${esc(src)}" loading="lazy" onclick="showLightbox('${esc(src)}')" />`
      ).join("");
      mediaHtml += `<div class="media-imgs">${imgs}</div>`;
    }
    if (m.media.links && m.media.links.length) {
      m.media.links.forEach(l => {
        const href = l.url || l.href || (typeof l === "string" ? l : "");
        if (href) mediaHtml += `<div class="media-link"><a href="${esc(href)}" target="_blank" rel="noreferrer">${esc(l.title || href)}</a></div>`;
      });
    }
  }

  row.innerHTML = `
    <div class="avatar" style="background:${color}">${esc(initial)}</div>
    <div class="msg-body">
      <div class="sender-name">${esc(name)}</div>
      <div class="bubble">${esc(m.text || "")}${mediaHtml}</div>
      <div class="bubble-time">${esc(timeStr)}</div>
    </div>
  `;
  return row;
}

// ---- 工具 ----
function esc(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtTime(iso) {
  if (!iso) return "";
  try {
    return new Date(iso.replace(" ", "T") + (iso.includes("+") ? "" : "Z")).toLocaleString("zh-CN", {
      month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
    });
  } catch { return iso; }
}

// ---- 灯箱 ----
const lightbox = document.getElementById("lightbox");
const lbImg    = document.getElementById("lb-img");
function showLightbox(src) { lbImg.src = src; lightbox.classList.add("show"); }
lightbox.onclick = () => lightbox.classList.remove("show");
</script>
</body>
</html>
